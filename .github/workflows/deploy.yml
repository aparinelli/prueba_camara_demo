name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Cache openFrameworks (compiled for Emscripten)
        id: of-cache
        uses: actions/cache@v4
        with:
          path: /opt/of
          key: of-0.12.1-emscripten-emsdk-4.0.4-v4-webgl2-exceptions

      - name: Download openFrameworks source
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: |
          wget -q -O of.tar.gz \
            https://github.com/openframeworks/openFrameworks/archive/refs/tags/0.12.1.tar.gz
          sudo mkdir -p /opt/of
          sudo tar -xzf of.tar.gz -C /opt/of --strip-components=1
          sudo chown -R $USER:$USER /opt/of

      - name: Download emscripten third-party libs
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: |
          cd /opt/of
          ./scripts/emscripten/download_libs.sh

      - name: Pull Emscripten Docker image
        run: docker pull emscripten/emsdk:4.0.4

      - name: Start Emscripten container
        run: |
          docker run -di --name em \
            -v /opt/of:/opt/of \
            -v $PWD:/project \
            emscripten/emsdk:4.0.4 bash

      - name: Patch oF emscripten config
        run: |
          CFG=/opt/of/libs/openFrameworksCompiled/project/emscripten/config.emscripten.default.mk
          # reallocarray is provided by emscripten as a JS import at runtime.
          sed -i 's/-sERROR_ON_UNDEFINED_SYMBOLS=1/-sERROR_ON_UNDEFINED_SYMBOLS=0/' "$CFG"
          # SharedArrayBuffer/COOP+COEP are not guaranteed for project Pages sites.
          sed -i 's/PLATFORM_PTHREAD = .*/PLATFORM_PTHREAD =/' "$CFG"
          sed -i 's/CFLAG_PLATFORM_PTHREAD = .*/CFLAG_PLATFORM_PTHREAD =/' "$CFG"
          grep -q -- '-fexceptions' "$CFG" || {
            printf '\nPLATFORM_CXXFLAGS += -fexceptions\n' >> "$CFG"
            printf 'PLATFORM_LDFLAGS += -fexceptions\n' >> "$CFG"
          }
          grep -q 'MIN_WEBGL_VERSION=2' "$CFG" || \
            printf '\nPLATFORM_LDFLAGS += -s MIN_WEBGL_VERSION=2\n' >> "$CFG"
          grep -q 'MAX_WEBGL_VERSION=2' "$CFG" || \
            printf '\nPLATFORM_LDFLAGS += -s MAX_WEBGL_VERSION=2\n' >> "$CFG"
          # Avoid source-map fetches delaying runtime start.
          sed -i 's/-gsource-map//g' "$CFG"
          sed -i 's/-sLOAD_SOURCE_MAP=1//g' "$CFG"

      - name: Patch oF Emscripten WebGL context setup
        run: |
          python3 - <<'EOF'
          path = '/opt/of/addons/ofxEmscripten/src/ofxAppEmscriptenWindow.cpp'
          with open(path, 'r', encoding='utf-8') as f:
              src = f.read()

          if '#include <cstdlib>' not in src:
              src = src.replace('#include "ofGLProgrammableRenderer.h"\n', '#include "ofGLProgrammableRenderer.h"\n#include <cstdlib>\n')

          old_setup = (
              '\tattrs.majorVersion = 2;\n'
              '\tattrs.minorVersion = 0;\n'
              '\tattrs.alpha = 0;\n'
              '\n'
              '\tcontext = emscripten_webgl_create_context("#canvas", &attrs);\n'
              '\tassert(context);\n'
              '\t  \n'
              '\tmakeCurrent();\n'
              '\n'
              '\t_renderer = std::make_shared<ofGLProgrammableRenderer>(this);\n'
              '\t((ofGLProgrammableRenderer*)_renderer.get())->setup(2,0);\n'
          )
          new_setup = (
              '\tattrs.majorVersion = 2;\n'
              '\tattrs.minorVersion = 0;\n'
              '\tattrs.alpha = 0;\n'
              '\n'
              '\tcontext = emscripten_webgl_create_context("#canvas", &attrs);\n'
              '\tif(context == 0){\n'
              '\t\tEM_ASM({\n'
              '\t\t\tconsole.error("openFrameworks failed to create a WebGL2 context for #canvas");\n'
              '\t\t});\n'
              '\t\tstd::abort();\n'
              '\t}\n'
              '\n'
              '\tEMSCRIPTEN_RESULT makeCurrentResult = emscripten_webgl_make_context_current(context);\n'
              '\tif(makeCurrentResult != EMSCRIPTEN_RESULT_SUCCESS){\n'
              '\t\tEM_ASM({\n'
              '\t\t\tconsole.error("openFrameworks failed to make the WebGL context current");\n'
              '\t\t});\n'
              '\t\tstd::abort();\n'
              '\t}\n'
              '\n'
              '\t_renderer = std::make_shared<ofGLProgrammableRenderer>(this);\n'
              '\t((ofGLProgrammableRenderer*)_renderer.get())->setup(2,0);\n'
          )
          if old_setup in src:
              src = src.replace(old_setup, new_setup)
          elif 'failed to create a WebGL2 context' not in src:
              raise SystemExit('Could not patch ofxAppEmscriptenWindow::setup WebGL context handling')

          old_make_current = (
              'void ofxAppEmscriptenWindow::makeCurrent(){\n'
              '\tif(context != 0){\n'
              '\t\temscripten_webgl_make_context_current(context);\t\n'
              '\t}\n'
              '}\n'
          )
          new_make_current = (
              'void ofxAppEmscriptenWindow::makeCurrent(){\n'
              '\tif(context != 0){\n'
              '\t\tEMSCRIPTEN_RESULT makeCurrentResult = emscripten_webgl_make_context_current(context);\n'
              '\t\tif(makeCurrentResult != EMSCRIPTEN_RESULT_SUCCESS){\n'
              '\t\t\tEM_ASM({\n'
              '\t\t\t\tconsole.error("openFrameworks lost the current WebGL context");\n'
              '\t\t\t});\n'
              '\t\t}\n'
              '\t}\n'
              '}\n'
          )
          if old_make_current in src:
              src = src.replace(old_make_current, new_make_current)
          elif 'lost the current WebGL context' not in src:
              raise SystemExit('Could not patch ofxAppEmscriptenWindow::makeCurrent')

          with open(path, 'w', encoding='utf-8') as f:
              f.write(src)
          EOF

      - name: Patch oF shader logging to avoid Emscripten locale crash
        run: |
          python3 - <<'EOF'
          path = '/opt/of/libs/openFrameworks/gl/ofShader.cpp'
          with open(path, 'r', encoding='utf-8') as f:
              src = f.read()

          replacements = [
              (
                  'ofLogError("ofShader") << "checkProgramLinkStatus(): OpenGL generated error " << err << " trying to get the program link status, does your video card support shader programs?";',
                  'ofLogError("ofShader", "checkProgramLinkStatus(): OpenGL generated error %u trying to get the program link status, does your video card support shader programs?", (unsigned)err);'
              ),
              (
                  'ofLogVerbose("ofShader") << "checkProgramLinkStatus(): program " << program << " linked";',
                  'ofLogVerbose("ofShader", "checkProgramLinkStatus(): program %u linked", (unsigned)program);'
              ),
              (
                  'ofLogVerbose("ofShader") << "linkProgram(): attaching " << nameForType(it.first) << " shader to program " << program;',
                  'ofLogVerbose("ofShader", "linkProgram(): attaching %s shader to program %u", nameForType(it.first).c_str(), (unsigned)program);'
              ),
          ]

          for old, new in replacements:
              src = src.replace(old, new)

          with open(path, 'w', encoding='utf-8') as f:
              f.write(src)
          EOF

      - name: Patch oF random engine for Emscripten
        run: |
          RNG=/opt/of/libs/openFrameworks/utils/ofRandomEngine.h
          perl -0pi -e 's/#include <random>/#include <chrono>\n#include <random>/' "$RNG"
          perl -0pi -e 's/std::random_device rd_ \{\};\n\tstd::seed_seq seq_ \{ rd_\(\), rd_\(\), rd_\(\), rd_\(\) \}; \/\/ 4 is considered fine for non-cryptographic needs\n\tstd::mt19937 gen_ \{ seq_ \};/#ifdef TARGET_EMSCRIPTEN\n\tstd::mt19937 gen_ { static_cast<std::mt19937::result_type>(std::chrono::steady_clock::now().time_since_epoch().count()) };\n#else\n\tstd::random_device rd_ {};\n\tstd::seed_seq seq_ { rd_(), rd_(), rd_(), rd_() }; \/\/ 4 is considered fine for non-cryptographic needs\n\tstd::mt19937 gen_ { seq_ };\n#endif/' "$RNG"

      - name: Patch oF Emscripten video bridge signatures
        run: |
          if ! grep -R -E 'ofVideoGrabber|ofVideoPlayer' src >/dev/null 2>&1; then
            echo "Project does not use video APIs; skipping video bridge patch."
            exit 0
          fi

          python3 - <<'EOF'
          from pathlib import Path
          import re

          path = Path("/opt/of/addons/ofxEmscripten/libs/html5video/lib/emscripten/library_html5video.js")
          src = path.read_text()

          src = src.replace(
              "    html5video_player_loop: function(id) {\n"
              "        return VIDEO.player[player_id].loop;\n"
              "    },",
              "    html5video_player_loop: function(id) {\n"
              "        return VIDEO.player[id].loop;\n"
              "    },",
          )

          src, count = re.subn(
              r"(\s*)video\.autoplay\s*=\s*true;\n(\s*)video\.pixelFormat = \"RGB\";",
              "\\1video.autoplay = true;\n"
              "\\1video.playsInline = true;\n"
              "\\1video.muted = true;\n"
              "\\2video.pixelFormat = \"RGB\";",
              src,
              count=1,
          )
          if count != 1:
              raise SystemExit("Could not patch grabber video element attributes")

          src, count = re.subn(
              r'(if \(video\.pixelFormat=="RGBA"\)\{\s*)array\.set\(imageData\.data\);',
              r'\1array = Module.HEAPU8.subarray(dstPixels, dstPixels+(video.width*video.height*4));'
              "\n\t            \tarray.set(imageData.data);",
              src,
              count=1,
          )
          if count != 1:
              raise SystemExit("Could not patch RGBA grabber pixel copy")

          src, count = re.subn(
              r"}catch\(e\)\{console\.log\(e\);\}",
              "}catch(e){console.error(\"Couldn't update video texture!\", e);}",
              src,
              count=1,
          )
          if count != 1:
              raise SystemExit("Could not patch video update error handler")

          constraints_pattern = re.compile(
              r"\n\s*if\(framerate==-1\) \{[\s\S]*?\n\s*}\s*\n\s*navigator\.mediaDevices\.getUserMedia\(constraints\)",
              re.MULTILINE,
          )
          src, count = constraints_pattern.subn(
              "\n"
              "            var constraints = {\n"
              "                audio: false,\n"
              "                video: {\n"
              "                    width: { ideal: w },\n"
              "                    height: { ideal: h },\n"
              "                    facingMode: \"user\"\n"
              "                }\n"
              "            };\n"
              "            if (framerate > 0) {\n"
              "                constraints.video.frameRate = { ideal: framerate };\n"
              "            }\n"
              "\n"
              "        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {\n"
              "          console.error(\"Couldn't init grabber!\", new Error(\"getUserMedia unavailable\"));\n"
              "          return;\n"
              "        }\n"
              "\n"
              "        navigator.mediaDevices.getUserMedia(constraints)",
              src,
              count=1,
          )
          if count != 1:
              raise SystemExit("Could not patch grabber media constraints")

          src = src.replace(
              "          VIDEO.grabber[grabber_id].onloadedmetadata = function (e) {\n"
              "            VIDEO.grabber[grabber_id].play();\n"
              "          }",
              "          VIDEO.grabber[grabber_id].onloadedmetadata = function (e) {\n"
              "            var playPromise = VIDEO.grabber[grabber_id].play();\n"
              "            if (playPromise && playPromise.catch) {\n"
              "              playPromise.catch(function(err) {\n"
              "                console.error(\"Couldn't play grabber!\", err);\n"
              "              });\n"
              "            }\n"
              "          }",
          )

          src, count = re.subn(
              r"\s*\.catch\(function\(err\) \{\s*console\.log\(e\);\s*\}\);",
              "\n"
              "        .catch(function(err) {\n"
              "          console.error(\"Couldn't init grabber!\", err);\n"
              "        });",
              src,
              count=1,
          )
          if count != 1 or ("console" + ".log(e)") in src:
              raise SystemExit("Unpatched grabber error handler")

          signatures = {
              "html5video_player_create": "i",
              "html5video_player_delete": "vi",
              "html5video_player_load": "vip",
              "html5video_player_load_url": "vip",
              "html5video_player_pixel_format": "pi",
              "html5video_player_set_pixel_format": "vip",
              "html5video_player_update": "iiip",
              "html5video_player_play": "vi",
              "html5video_player_pause": "vi",
              "html5video_player_stop": "vi",
              "html5video_player_texture_id": "ii",
              "html5video_player_width": "ii",
              "html5video_player_height": "ii",
              "html5video_player_is_paused": "ii",
              "html5video_player_ready_state": "ii",
              "html5video_player_duration": "di",
              "html5video_player_current_time": "di",
              "html5video_player_set_current_time": "vid",
              "html5video_player_ended": "ii",
              "html5video_player_set_playback_rate": "vid",
              "html5video_player_playback_rate": "di",
              "html5video_player_volume": "di",
              "html5video_player_set_volume": "vid",
              "html5video_player_set_loop": "vii",
              "html5video_player_loop": "ii",
              "html5video_player_pan": "di",
              "html5video_player_set_pan": "vid",
              "html5video_list_devices": "v",
              "html5video_grabber_create": "i",
              "html5video_grabber_init": "viiii",
              "html5video_grabber_pixel_format": "pi",
              "html5video_grabber_set_pixel_format": "vip",
              "html5video_grabber_update": "iiip",
              "html5video_grabber_texture_id": "ii",
              "html5video_grabber_width": "ii",
              "html5video_grabber_height": "ii",
              "html5video_grabber_ready_state": "ii",
          }

          for name, sig in signatures.items():
              sig_line = f"    {name}__sig: '{sig}',\n"
              if f"{name}__sig" in src:
                  continue
              pattern = re.compile(rf"^(\s*)({re.escape(name)}: function)", re.MULTILINE)
              src, count = pattern.subn(
                  lambda match: f"{match.group(1)}{name}__sig: '{sig}',\n{match.group(1)}{match.group(2)}",
                  src,
                  count=1,
              )
              if count != 1:
                  raise SystemExit(f"Missing JS bridge function {name}")

          path.write_text(src)
          EOF

      - name: Compile openFrameworks core for Emscripten
        if: steps.of-cache.outputs.cache-hit != 'true'
        run: |
          docker exec em bash -c '
            cd /opt/of/libs/openFrameworksCompiled/project
            sed -i "s/PLATFORM_OPTIMIZATION_CFLAGS_DEBUG = .*/PLATFORM_OPTIMIZATION_CFLAGS_DEBUG = -g0/" \
              emscripten/config.emscripten.default.mk
            emmake make -j$(nproc) Release
          '

      - name: Build project
        run: |
          docker exec em bash -c '
            cd /project
            sed -i "/^ofxOpenCv$/d" addons.make
            emmake make OF_ROOT=/opt/of -j$(nproc) Release
          '

      - name: Collect web output
        run: |
          mkdir _site
          find bin/em -type f \
            \( -name "*.html" -o -name "*.js" -o -name "*.wasm" -o -name "*.data" \
               -o -name "*.css" -o -name ".htaccess" \) \
            -exec cp {} _site/ \;
          html_file="$(find _site -maxdepth 1 -name '*.html' | head -n1)"
          if [ -n "$html_file" ] && [ "$html_file" != "_site/index.html" ]; then
            mv "$html_file" _site/index.html
          fi

      - name: Normalize generated Emscripten HTML bootstrap
        run: |
          python3 - <<'EOF'
          from pathlib import Path
          import re

          path = Path("_site/index.html")
          html = path.read_text()

          html = re.sub(
              r'\s*<script(?:\s+async)?\s+type="text/javascript"\s+src="(?:app|index)\.js"></script>',
              '',
              html,
          )

          bootstrap = '''    <script type="text/javascript" src="app.js"></script>
              <script>
                window.Module = typeof Module !== "undefined" ? Module : (window.Module || {});
                Module.canvas = Module.canvas || document.getElementById("canvas");
              </script>
              <script type="text/javascript" src="index.js"></script>
          '''

          fit_style = '''    <style id="prueba-camara-fit-screen">
                html, body {
                  margin: 0;
                  width: 100%;
                  height: 100%;
                  overflow: hidden;
                  background: #fff;
                }

                #header {
                  width: 100vw;
                  height: 100vh;
                  overflow: hidden;
                }

                #logo, #controls, #status, #spinner, progress, textarea#output {
                  display: none !important;
                }

                .emscripten_border {
                  width: 100vw;
                  height: 100vh;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  overflow: hidden;
                  border: 0;
                }

                canvas.emscripten {
                  width: min(100vw, calc(100vh * 16 / 9));
                  height: min(calc(100vw * 9 / 16), 100vh);
                  display: block;
                  outline: none;
                }
              </style>
          '''

          if "prueba-camara-fit-screen" not in html:
              if "  </head>" not in html:
                  raise SystemExit("Could not find closing head tag in generated Emscripten HTML")
              html = html.replace("  </head>", fit_style + "  </head>", 1)

          if "  </body>" not in html:
              raise SystemExit("Could not find closing body tag in generated Emscripten HTML")

          path.write_text(html.replace("  </body>", bootstrap + "  </body>"))
          EOF

      - name: Patch generated Emscripten target lookup
        run: |
          python3 - <<'EOF'
          from pathlib import Path

          path = Path("_site/index.js")
          js = path.read_text()
          old = 'var findCanvasEventTarget=findEventTarget;Module["findCanvasEventTarget"]=findCanvasEventTarget;'
          new = 'var findCanvasEventTarget=target=>Module["canvas"]||(typeof document!="undefined"?document.getElementById("canvas"):null);Module["findCanvasEventTarget"]=findCanvasEventTarget;'

          if old in js:
              js = js.replace(old, new)
          elif 'document.getElementById("canvas")' not in js:
              raise SystemExit("Could not patch generated Emscripten canvas target lookup")

          path.write_text(js)
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
